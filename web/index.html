<!DOCTYPE html><html lang="zh-Hant"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Score Web</title>
    
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  
  
  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #000000;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
  <body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  
  
  
    <div id="app"></div>
    <!-- 雲端影片清單區 -->
    <h2>雲端影片清單</h2>
    <div id="cloud-gallery"></div>
    <!-- 以 ES 模組方式載入進入點 -->
    <script type="module" src="/src/main.js"></script>
    <script>
      // 取得後端已上傳的影片並顯示
      async function loadCloudVideos() {
        const baseUrl = 'https://9eazqxfttdu2jv6j.atk.tw'
        const res = await fetch(baseUrl + '/videos')
        const files = await res.json()
        const gallery = document.getElementById('cloud-gallery')
        gallery.innerHTML = ''
        for (const name of files) {
          const video = document.createElement('video')
          video.src = baseUrl + '/videos/' + encodeURIComponent(name)
          video.controls = true
          video.width = 300
          gallery.appendChild(video)
        }
      }
      loadCloudVideos()
      // 暴露給外部以便錄影頁面呼叫刷新
      window.loadCloudVideos = loadCloudVideos
    </script>
  

</body></html>
