version: '3.8'

services:
  # ============ RabbitMQ 消息队列 ============
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: meshflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"      # AMQP 端口
      - "15672:15672"    # 管理界面端口
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ Redis 缓存 ============
  redis:
    image: redis:7-alpine
    container_name: meshflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ PostgreSQL 主数据库 ============
  postgres-master:
    image: postgres:15-alpine
    container_name: meshflow-postgres-master
    environment:
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow_password
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ./init-master.sql:/docker-entrypoint-initdb.d/10-init-master.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshflow"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ PostgreSQL 从数据库 ============
  postgres-slave:
    image: postgres:15-alpine
    container_name: meshflow-postgres-slave
    environment:
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_slave_data:/var/lib/postgresql/data
      - ./init-slave.sql:/docker-entrypoint-initdb.d/10-init-slave.sql:ro
    depends_on:
      postgres-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshflow"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ Prometheus 监控 ============
  prometheus:
    image: prom/prometheus:latest
    container_name: meshflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ Grafana 仪表盘 ============
  grafana:
    image: grafana/grafana:latest
    container_name: meshflow-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ Jaeger 分布式追踪 ============
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: meshflow-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    ports:
      - "6831:6831/udp"    # Jaeger agent
      - "16686:16686"      # Jaeger UI
      - "9411:9411"        # Zipkin compatible endpoint
    volumes:
      - jaeger_data:/badger/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ Elasticsearch 日志存储 ============
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.7.0
    container_name: meshflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ELASTIC_PASSWORD=elastic_password
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ Kibana 日志查看 ============
  kibana:
    image: docker.elastic.co/kibana/kibana:8.7.0
    container_name: meshflow-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ Logstash 日志处理 ============
  logstash:
    image: docker.elastic.co/logstash/logstash:8.7.0
    container_name: meshflow-logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5000:5000"
      - "9600:9600"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=elastic_password
    depends_on:
      - elasticsearch
    networks:
      - meshflow-network
    restart: unless-stopped

  # ============ Nginx 负载均衡 ============
  nginx:
    image: nginx:alpine
    container_name: meshflow-nginx
    ports:
      - "8080:8080"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - rabbitmq
      - redis
      - postgres-master
      - prometheus
      - grafana
      - jaeger
      - kibana
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meshflow-network
    restart: unless-stopped

# ============ 网络定义 ============

networks:
  meshflow-network:
    driver: bridge

# ============ 数据卷定义 ============

volumes:
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local
  postgres_master_data:
    driver: local
  postgres_slave_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  jaeger_data:
    driver: local
  elasticsearch_data:
    driver: local
