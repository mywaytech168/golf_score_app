<style>
:root{
  --bg:#0A0A0A;
  --bg-soft:#111111;
  --card:#1A1A1A;
  --border:#262626;
  --border-bright:#3a3a3a;
  --green:#4A7FFF;--grad:linear-gradient(135deg,#00E5CC,#4A7FFF,#6B4FD8);--grad-start:#00E5CC;--grad-end:#6B4FD8;
  --green-dim:rgba(74,127,255,.12);
  --text:#F5F5F5;
  --muted:#8a8a8a;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','PingFang SC','Microsoft JhengHei','Microsoft YaHei',sans-serif;
  line-height:1.7;-webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
.container{max-width:760px;margin:0 auto;padding:0 24px}

/* ---------- Nav ---------- */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:760px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.05rem;letter-spacing:.02em}
.brand-logo{height:30px;display:block}
.brand-name{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;font-weight:800}
.lang-switch{display:flex;gap:4px;border:1px solid var(--border);border-radius:999px;padding:3px;background:var(--bg-soft)}
.lang-switch button{background:none;border:none;color:var(--muted);font:inherit;font-size:.78rem;font-weight:600;padding:4px 12px;border-radius:999px;cursor:pointer;transition:color .2s,background .2s}
.lang-switch button.active{background:var(--grad);color:#001016;-webkit-text-fill-color:#001016;-webkit-background-clip:border-box;background-clip:border-box}
.lang-switch button:not(.active):hover{color:var(--text)}

/* ---------- Layout ---------- */
.wrap{max-width:760px;margin:0 auto;padding:120px 24px 80px}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;margin-bottom:14px}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--grad)}
h1{font-size:2.2rem;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
.lead{color:var(--muted);font-size:1.02rem;margin-bottom:40px;max-width:560px}
h2{font-size:1.25rem;font-weight:700;margin:0 0 14px}

/* ---------- Email block ---------- */
.email-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px 28px;margin-bottom:40px}
.email-card p{color:#d4d4d4;margin-bottom:18px}
.email-btn{display:inline-flex;align-items:center;gap:10px;padding:13px 24px;border-radius:12px;font-weight:700;font-size:.98rem;background:var(--grad);color:#001016;-webkit-text-fill-color:#001016;-webkit-background-clip:border-box;background-clip:border-box;transition:transform .15s ease,opacity .2s}
.email-btn:hover{opacity:.9}
.email-btn:active{transform:scale(.97)}
.email-btn svg{width:20px;height:20px;flex-shrink:0;stroke:#001016;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ---------- Form ---------- */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.86rem;font-weight:600;margin-bottom:7px;color:#cfcfcf}
.field label .req{color:var(--green);margin-left:3px}
.field input,.field textarea{
  width:100%;background:var(--bg-soft);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:inherit;font-size:.95rem;padding:12px 14px;transition:border-color .2s;
}
.field input::placeholder,.field textarea::placeholder{color:#5f5f5f}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--green)}
.field textarea{resize:vertical;min-height:130px}
.submit-btn{
  display:inline-flex;align-items:center;gap:8px;width:100%;justify-content:center;
  padding:14px 24px;border-radius:12px;font-weight:700;font-size:.98rem;border:none;cursor:pointer;
  background:var(--grad);color:#001016;-webkit-text-fill-color:#001016;-webkit-background-clip:border-box;background-clip:border-box;
  transition:transform .15s ease,opacity .2s;
}
.submit-btn:hover{opacity:.92}
.submit-btn:active{transform:scale(.99)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
#cf-status{margin-top:16px;font-size:.92rem;font-weight:600;min-height:1.2em}

/* ---------- Footer ---------- */
footer{padding:40px 0;border-top:1px solid var(--border)}
.footer-inner{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.footer-links{display:flex;gap:22px;align-items:center;font-size:.86rem;color:var(--muted);flex-wrap:wrap}
.footer-links a:hover{color:var(--text)}
.copyright{font-size:.8rem;color:#555;margin-top:24px}

@media (max-width:560px){
  h1{font-size:1.85rem}
  .footer-inner{flex-direction:column;text-align:center}
}

window.CONTACT_I18N = CONTACT_I18N;
window.CONTACT_LANG = "zh";

function setLang(lang){
  if(!CONTACT_I18N[lang]) lang = "zh";
  window.CONTACT_LANG = lang;
  var dict = CONTACT_I18N[lang];
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    var k = el.getAttribute("data-i18n");
    if(dict[k] !== undefined) el.textContent = dict[k];
  });
  document.documentElement.lang = lang==="zh" ? "zh-TW" : (lang==="cn" ? "zh-CN" : lang);
  document.querySelectorAll(".lang-switch button").forEach(function(b){
    b.classList.toggle("active", b.dataset.lang===lang);
  });
  try{ localStorage.setItem("orvia_lang", lang); }catch(e){}
}

document.querySelectorAll(".lang-switch button").forEach(function(b){
  b.addEventListener("click", function(){ setLang(b.dataset.lang); });
});

var saved = null;
try{ saved = localStorage.getItem("orvia_lang"); }catch(e){}
setLang(saved || "zh");
