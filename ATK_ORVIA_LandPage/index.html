<link rel="icon" type="image/png" href="images/brand-icon.png">
<link rel="apple-touch-icon" href="images/brand-icon.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A;
  --bg-soft:#111111;
  --card:#1A1A1A;
  --border:#262626;
  --border-bright:#3a3a3a;
  --green:#4A7FFF;--grad:linear-gradient(135deg,#00E5CC,#4A7FFF,#6B4FD8);--grad-start:#00E5CC;--grad-end:#6B4FD8;
  --green-dim:rgba(74,127,255,.12);
  --text:#F5F5F5;
  --muted:#8a8a8a;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','PingFang SC','Microsoft JhengHei','Microsoft YaHei',sans-serif;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.container{max-width:1120px;margin:0 auto;padding:0 24px}
a{color:inherit;text-decoration:none}
img{max-width:100%}
section{padding:96px 0}

/* ---------- Nav ---------- */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,10,10,.8);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-inner{
  max-width:1120px;margin:0 auto;padding:0 24px;
  height:60px;display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.05rem;letter-spacing:.02em}
.brand-logo{height:30px;display:block}
.lang-switch{display:flex;gap:4px;border:1px solid var(--border);border-radius:999px;padding:3px;background:var(--bg-soft)}
.lang-switch button{
  background:none;border:none;color:var(--muted);
  font:inherit;font-size:.78rem;font-weight:600;
  padding:4px 12px;border-radius:999px;cursor:pointer;
  transition:color .2s,background .2s;
}
.lang-switch button.active{background:var(--grad);color:#001016;-webkit-text-fill-color:#001016;-webkit-background-clip:border-box;background-clip:border-box}
.lang-switch button:not(.active):hover{color:var(--text)}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:13px 24px;border-radius:12px;font-weight:600;font-size:.95rem;
  border:1px solid var(--border-bright);background:var(--card);color:var(--text);
  transition:transform .15s ease,border-color .2s,background .2s;
  cursor:pointer;
}
.btn:hover{border-color:var(--green)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--grad);border-color:transparent;color:#001016;-webkit-text-fill-color:#001016;-webkit-background-clip:border-box;background-clip:border-box}
.btn-primary:hover{background:#5eead4}
.btn svg{width:20px;height:20px;flex-shrink:0}
.btn small{display:block;font-size:.68rem;font-weight:500;opacity:.75;line-height:1.1}
.btn .store-label{text-align:left;line-height:1.15}
.badge-soon{
  font-size:.62rem;font-weight:700;letter-spacing:.05em;
  background:var(--green-dim);background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  border:1px solid rgba(74,127,255,.3);
  padding:2px 8px;border-radius:999px;margin-left:4px;
}

/* ---------- Hero ---------- */
.hero{
  min-height:100vh;display:flex;align-items:center;
  padding:140px 0 80px;position:relative;
}
.hero::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(600px 400px at 75% 35%,rgba(74,127,255,.07),transparent 70%),
    radial-gradient(800px 500px at 20% 80%,rgba(74,127,255,.04),transparent 70%);
}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center;position:relative}
.hero-logo{height:64px;display:block;margin-bottom:28px}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;margin-bottom:20px;
}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--grad)}
.hero h1{
  font-size:clamp(2.4rem,5vw,3.6rem);font-weight:800;line-height:1.12;
  letter-spacing:-.02em;margin-bottom:20px;
}
.hero h1 .accent{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.hero .lead{color:var(--muted);font-size:1.08rem;max-width:480px;margin-bottom:36px}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap}

/* ---------- CSS Phone Mockup ---------- */
.phone-wrap{display:flex;justify-content:center;perspective:1000px}
.hero-shot{display:block;width:100%;max-width:300px;height:auto;margin:0 auto;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 30px 60px rgba(0,0,0,.55)) drop-shadow(0 0 60px rgba(74,127,255,.18))}
.compare-shot{display:block;width:100%;max-width:240px;height:auto;margin:0 auto;filter:drop-shadow(0 24px 50px rgba(0,0,0,.5)) drop-shadow(0 0 50px rgba(74,127,255,.14))}
.phone{
  width:270px;height:556px;border-radius:42px;
  background:#161616;
  border:1px solid #2e2e2e;
  box-shadow:0 0 0 8px #0f0f0f,0 40px 80px -20px rgba(0,0,0,.8),0 0 120px -30px rgba(74,127,255,.25);
  padding:12px;position:relative;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.phone-screen{
  width:100%;height:100%;border-radius:32px;overflow:hidden;
  background:linear-gradient(180deg,#0d1412 0%,#0a0a0a 100%);
  display:flex;flex-direction:column;position:relative;
}
.phone-notch{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:84px;height:22px;border-radius:999px;background:#000;z-index:2;
}
.ps-header{padding:46px 18px 10px;display:flex;justify-content:space-between;align-items:center}
.ps-header .ps-title{font-size:.8rem;font-weight:700}
.ps-rec{display:flex;align-items:center;gap:5px;font-size:.6rem;color:#f87171;font-weight:700}
.ps-rec i{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.ps-canvas{
  flex:1;margin:8px 14px;border-radius:16px;position:relative;
  background:linear-gradient(180deg,#101816 0%,#0c100f 60%,#0e1211 100%);
  border:1px solid #1f2a27;overflow:hidden;
}
.ps-canvas svg{position:absolute;inset:0;width:100%;height:100%}
.ps-stats{display:flex;gap:8px;padding:10px 14px 18px}
.ps-stat{
  flex:1;background:#141a18;border:1px solid #1f2a27;border-radius:10px;
  padding:8px 10px;
}
.ps-stat b{display:block;font-size:.86rem;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;font-weight:700}
.ps-stat span{font-size:.55rem;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}

/* ---------- Section headings ---------- */
.sec-head{text-align:center;max-width:620px;margin:0 auto 56px}
.sec-head h2{font-size:clamp(1.7rem,3.4vw,2.4rem);font-weight:800;letter-spacing:-.01em;margin-bottom:14px}
.sec-head p{color:var(--muted);font-size:1rem}

/* ---------- Feature cards ---------- */
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:30px 26px;transition:border-color .25s;
}
.card:hover{border-color:var(--border-bright)}
.card .icon{
  width:44px;height:44px;border-radius:12px;margin-bottom:20px;
  background:var(--green-dim);border:1px solid rgba(74,127,255,.25);
  display:flex;align-items:center;justify-content:center;
}
.card .icon svg{width:22px;height:22px;stroke:var(--green);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.card h3{font-size:1.08rem;font-weight:700;margin-bottom:10px}
.card p{color:var(--muted);font-size:.92rem}

/* ---------- Steps ---------- */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;position:relative}
.step{text-align:center;padding:36px 22px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);position:relative}
.step .num{
  width:40px;height:40px;border-radius:50%;margin:0 auto 18px;
  border:1px solid var(--green);background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.95rem;background:var(--green-dim);
}
.step h3{font-size:1.02rem;font-weight:700;margin-bottom:8px}
.step p{color:var(--muted);font-size:.9rem}
.step::after{
  content:"→";position:absolute;right:-22px;top:50%;transform:translateY(-50%);
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;font-size:1.2rem;z-index:1;
}
.step:last-child::after{display:none}

/* ---------- Showcase ---------- */
.show-row{
  display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;
  padding:48px 0;
}
.show-row:nth-child(even) .show-visual{order:2}
.show-text .tag{
  display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;margin-bottom:14px;
}
.show-text h3{font-size:1.5rem;font-weight:800;margin-bottom:14px;letter-spacing:-.01em}
.show-text p{color:var(--muted);font-size:.98rem;max-width:440px}
.mini-phone{
  width:210px;height:430px;border-radius:34px;margin:0 auto;
  background:#161616;border:1px solid #2c2c2c;padding:10px;
  box-shadow:0 0 0 6px #0f0f0f,0 30px 60px -20px rgba(0,0,0,.7);
}
.mini-screen{
  width:100%;height:100%;border-radius:25px;overflow:hidden;
  background:#0c0f0c;border:1px solid #1c241c;
  display:flex;flex-direction:column;
}
.mini-screen svg{width:100%;height:100%}

/* ---------- Pricing ---------- */
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1040px;margin:0 auto}
.plan{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:36px 32px;display:flex;flex-direction:column;
  transition:border-color .25s;
}
.plan:hover{border-color:var(--border-bright)}
.plan.pro{border-color:rgba(74,127,255,.45);position:relative}
.plan.pro:hover{border-color:var(--green)}
.plan .plan-badge{
  position:absolute;top:-12px;left:32px;
  background:var(--grad);color:#001016;-webkit-text-fill-color:#001016;-webkit-background-clip:border-box;background-clip:border-box;font-size:.68rem;font-weight:800;
  letter-spacing:.06em;padding:3px 12px;border-radius:999px;text-transform:uppercase;
}
.plan h3{font-size:1.05rem;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;font-size:.82rem}
.plan .price{font-size:2rem;font-weight:800;margin-bottom:4px}
.plan .price-note{color:var(--muted);font-size:.85rem;margin-bottom:26px}
.plan ul{list-style:none;display:flex;flex-direction:column;gap:13px;margin-bottom:30px;flex:1}
.plan li{display:flex;gap:10px;font-size:.92rem;align-items:flex-start}
.plan li svg{width:17px;height:17px;flex-shrink:0;margin-top:3px}
.plan li.yes svg{stroke:var(--green)}
.plan li.no{color:var(--muted)}
.plan li.no svg{stroke:#525252}

/* ---------- Referral strip ---------- */
.referral{
  padding:0;
}
.referral-inner{
  display:flex;align-items:center;justify-content:center;gap:14px;
  background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);
  padding:26px 32px;flex-wrap:wrap;text-align:center;
}
.referral-inner svg{width:22px;height:22px;stroke:var(--green);fill:none;stroke-width:1.8;flex-shrink:0}
.referral-inner p{color:var(--text);font-size:.96rem}
.referral-inner p b{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}

/* ---------- Download CTA ---------- */
.cta{
  background:linear-gradient(180deg,#0d130e 0%,#0A0A0A 100%);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  text-align:center;
}
.cta h2{font-size:clamp(1.8rem,3.6vw,2.6rem);font-weight:800;letter-spacing:-.01em;margin-bottom:14px}
.cta p{color:var(--muted);margin-bottom:36px}
.cta .hero-ctas{justify-content:center}

/* ---------- Footer ---------- */
footer{padding:48px 0;border-top:1px solid var(--border)}
.footer-inner{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.footer-links{display:flex;gap:28px;align-items:center;font-size:.86rem;color:var(--muted)}
.footer-links a:hover{color:var(--text)}
.copyright{font-size:.8rem;color:#555;margin-top:24px}

/* ---------- Reveal animation ---------- */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){
  .reveal{opacity:1;transform:none;transition:none}
  .phone{animation:none}
}

/* ---------- RWD ---------- */
@media (max-width:900px){
  section{padding:72px 0}
  .hero{padding-top:120px}
  .hero-grid{grid-template-columns:1fr;gap:56px;text-align:center}
  .hero .lead{margin:0 auto 36px}
  .hero-logo{margin:0 auto 24px;height:52px}
  .hero-ctas{justify-content:center}
  .eyebrow{justify-content:center}
  .cards3,.steps{grid-template-columns:1fr;max-width:440px;margin:0 auto}
  .step::after{content:"↓";right:auto;left:50%;top:auto;bottom:-26px;transform:translateX(-50%)}
  .show-row{grid-template-columns:1fr;gap:36px;text-align:center}
  .show-row:nth-child(even) .show-visual{order:0}
  .show-text p{margin:0 auto}
  .pricing-grid{grid-template-columns:1fr;max-width:460px}
  .footer-inner{flex-direction:column;text-align:center}
}
@media (max-width:560px){
  .hero h1{font-size:2.1rem}
  .phone{width:240px;height:496px}
  .btn{width:100%;justify-content:center}
  .hero-ctas{flex-direction:column;width:100%}
  .cta .hero-ctas{align-items:center}
}
.brand-name{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;font-weight:800}</style>
  <script defer src="js/analytics.js"></script>
</head>
<body>

<!-- ============ NAV ============ -->
<nav>
  <div class="nav-inner">
    <a class="brand" href="#top">
      <img class="brand-logo" src="images/brand-icon.png" alt="ORVIA"><span class="brand-name">ORVIA</span>
    </a>
    <div class="lang-switch" role="group" aria-label="Language">
      <button data-lang="zh">繁</button>
      <button data-lang="cn">简</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
</nav>

<!-- ============ 1. HERO ============ -->
<header class="hero" id="top">
  <div class="container hero-grid">
    <div>
      <img class="hero-logo" src="images/orvia-logo.png" alt="ORVIA — Human Motion Intelligence">
      <span class="eyebrow" data-i18n="hero.eyebrow"></span>
      <h1>AI 高爾夫揮桿分析 App<br><span class="accent">Your AI Golf Coach, In Your Pocket.</span></h1>
      <p class="lead" data-i18n="hero.lead"></p>
      <div class="hero-ctas">
        <a class="btn btn-primary" href="#download">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 1.8 13.8 12 3.6 22.2c-.4-.2-.6-.7-.6-1.2V3c0-.5.2-1 .6-1.2zm12.1 8.3 2.6-1.5 3 1.7c.9.5.9 1.9 0 2.4l-3 1.7-2.6-1.5L14.6 12l1.1-1.9zM5.2 1.3l11 6.3-2.3 2.3L5.2 1.3zm0 21.4 8.7-8.6 2.3 2.3-11 6.3z"/></svg>
          <span class="store-label"><small data-i18n="hero.gpSmall"></small>Google Play</span>
        </a>
        <a class="btn" href="#download">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.7 12.9c0-2.6 2.1-3.8 2.2-3.9-1.2-1.8-3.1-2-3.8-2-1.6-.2-3.1 1-3.9 1s-2-1-3.4-1c-1.7 0-3.3 1-4.2 2.6-1.8 3.1-.5 7.7 1.3 10.2.9 1.2 1.9 2.6 3.2 2.5 1.3-.1 1.8-.8 3.4-.8s2 .8 3.4.8 2.3-1.2 3.1-2.4c1-1.4 1.4-2.8 1.4-2.8s-2.7-1-2.7-4.2zM14.1 4.9c.7-.9 1.2-2.1 1.1-3.3-1 0-2.3.7-3 1.6-.7.8-1.3 2-1.1 3.2 1.1.1 2.3-.6 3-1.5z"/></svg>
          <span class="store-label"><small data-i18n="hero.asSmall"></small>App Store<span class="badge-soon" data-i18n="hero.soon"></span></span>
        </a>
      </div>
    </div>

    <div class="phone-wrap">
      <img class="hero-shot" src="images/orvia_phone_only_transparent.png" alt="ORVIA App — Swing Analysis">
    </div>
  </div>
</header>

<!-- ============ 2. CORE FEATURES ============ -->
<section id="features">
  <div class="container">
    <div class="sec-head reveal">
      <h2 data-i18n="feat.title"></h2>
      <p data-i18n="feat.sub"></p>
    </div>
    <div class="cards3">
      <div class="card reveal">
        <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2.2"/><path d="M12 7.5v5M12 12.5l-4 4M12 12.5l4 4M12 9.5l-4.5 2M12 9.5l4.5 2"/></svg></div>
        <h3 data-i18n="feat.c1.t"></h3>
        <p data-i18n="feat.c1.d"></p>
      </div>
      <div class="card reveal">
        <div class="icon"><svg viewBox="0 0 24 24"><path d="M4 19 Q 10 4 20 8"/><circle cx="4" cy="19" r="1.8"/><circle cx="20" cy="8" r="1.8"/></svg></div>
        <h3 data-i18n="feat.c2.t"></h3>
        <p data-i18n="feat.c2.d"></p>
      </div>
      <div class="card reveal">
        <div class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="7.5" height="14" rx="1.5"/><rect x="13.5" y="5" width="7.5" height="14" rx="1.5"/></svg></div>
        <h3 data-i18n="feat.c3.t"></h3>
        <p data-i18n="feat.c3.d"></p>
      </div>
    </div>
  </div>
</section>

<!-- ============ 3. HOW IT WORKS ============ -->

function setLang(lang){
  if(!I18N[lang]) lang = "zh";
  const dict = I18N[lang];
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if(dict[k] !== undefined) el.textContent = dict[k];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{
    const k = el.getAttribute("data-i18n-html");
    if(dict[k] !== undefined) el.innerHTML = dict[k];
  });
  document.documentElement.lang = lang==="zh" ? "zh-TW" : (lang==="cn" ? "zh-CN" : lang);
  document.querySelectorAll(".lang-switch button").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang===lang);
  });
  try{ localStorage.setItem("orvia_lang", lang); }catch(e){}
}

document.querySelectorAll(".lang-switch button").forEach(b=>{
  b.addEventListener("click", ()=>setLang(b.dataset.lang));
});

let saved = null;
try{ saved = localStorage.getItem("orvia_lang"); }catch(e){}
setLang(saved || "zh");

// scroll reveal
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("in");
      io.unobserve(e.target);
    }
  });
},{threshold:0.15});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
</script>
